name: Chromatic

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: chromatic-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chromatic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Chromatic needs full git history to find the baseline

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          exitZeroOnChanges: true   # visual diffs surface as a check, don't fail the job
          onlyChanged: true         # TurboSnap: only rebuild stories affected by the diff
